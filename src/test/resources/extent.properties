# ──────────────────────────────────────────────────────────────
#  ExtentReports Cucumber7 Adapter – Configuration
#  (read automatically by the ExtentCucumberAdapter plugin)
# ──────────────────────────────────────────────────────────────

# Enable / disable the adapter
extent.reporter.spark.start=true
extent.reporter.spark.out=target/extent-reports/AvizSparkReport.html

# Report title and name shown inside the HTML
extent.reporter.spark.vieworder=dashboard,test,category,device,exception,author,log
extent.reporter.spark.title=Aviz Aero – Registration Automation Report
extent.reporter.spark.name=BDD Execution Report
extent.reporter.spark.theme=dark
extent.reporter.spark.encoding=UTF-8

# Attach screenshots to the report on test failure
screenshot.dir=target/screenshots/
screenshot.rel.path=../../target/screenshots/
