# ============================================================
#  Aviz Automation Framework – Configuration
# ============================================================

# Browser: chrome | firefox | edge
browser=chrome

# Base URL
base.url=https://demo.aviz.aero

# Implicit wait (seconds)
implicit.wait=10

# Explicit wait timeout (seconds)
explicit.wait=15

# Page load timeout (seconds)
page.load.timeout=30

# Run headless: true | false
headless=false

# Screenshot on failure: true | false
screenshot.on.failure=true

# Reports output directory
reports.output.dir=target/extent-reports

# Cucumber HTML report path
cucumber.html.report=target/cucumber-reports/cucumber.html
